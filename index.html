<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trade Journal Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --bg: #f8f9fa; --card: white; --text: #333; }
        body.dark { --bg: #121212; --card: #1e1e1e; --text: #ddd; }
        body { font-family: system-ui, sans-serif; margin:0; padding:20px; background:var(--bg); color:var(--text); transition:0.3s; }
        .container { max-width: 1400px; margin:auto; background:var(--card); padding:20px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align:center; margin-bottom:10px; }
        .controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:15px 0; }
        button { padding:10px 16px; border:none; border-radius:6px; cursor:pointer; }
        .btn-primary { background:#007bff; color:white; }
        .btn-danger { background:#dc3545; color:white; }
        form { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:12px; margin:20px 0; }
        input, select, textarea { padding:10px; border:1px solid #ccc; border-radius:6px; background:var(--card); color:var(--text); }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th, td { padding:12px; text-align:left; border-bottom:1px solid #ddd; }
        th { background:#007bff; color:white; cursor:pointer; }
        .win { color:#28a745; font-weight:bold; } .loss { color:#dc3545; font-weight:bold; }
        .dashboard { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:15px; margin:20px 0; }
        .card { background:var(--card); padding:15px; border-radius:8px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
        .chart-container { margin:30px 0; padding:15px; background:var(--card); border-radius:10px; }
        @media (max-width:768px) { form { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h1>📈 My Trade Journal Pro</h1>
    <div class="controls">
        <button class="btn-primary" onclick="toggleDarkMode()">🌙 Dark Mode</button>
        <button class="btn-primary" onclick="exportCSV()">Export CSV</button>
        <button class="btn-danger" onclick="clearAllData()">Clear All Data</button>
    </div>

    <div class="dashboard" id="stats"></div>

    <div class="chart-container">
        <h2>Equity Curve</h2>
        <canvas id="equityChart" height="120"></canvas>
    </div>
    <div class="chart-container" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div><h2>Win Rate</h2><canvas id="winChart" height="180"></canvas></div>
        <div><h2>Monthly P&L</h2><canvas id="monthlyChart" height="180"></canvas></div>
    </div>

    <h2>Add Trade</h2>
    <form id="tradeForm">
        <input type="text" id="symbol" placeholder="Symbol (e.g. EURUSD)" required>
        <input type="date" id="date" required>
        <select id="direction" required><option value="">Direction</option><option value="Long">Long</option><option value="Short">Short</option></select>
        <input type="number" id="entry" placeholder="Entry Price" step="0.00001" required>
        <input type="number" id="exit" placeholder="Exit Price" step="0.00001">
        <input type="number" id="quantity" placeholder="Quantity" step="0.01" required>
        <input type="number" id="riskPercent" placeholder="Risk %" step="0.1">
        <input type="number" id="rMultiple" placeholder="R-Multiple" step="0.1">
        <select id="emotion"><option value="">Emotion</option><option value="Confident">Confident</option><option value="Fearful">Fearful</option><option value="Greedy">Greedy</option><option value="Disciplined">Disciplined</option></select>
        <input type="text" id="strategy" placeholder="Strategy / Setup">
        <textarea id="notes" placeholder="Notes / Lessons Learned" rows="2"></textarea>
        <input type="text" id="screenshot" placeholder="Screenshot URL (Imgur etc.)">
        <button type="submit" class="btn-primary" style="grid-column:1/-1;">Log Trade</button>
    </form>

    <h2>Trade History <span style="font-size:0.9em;opacity:0.7;">(click headers to sort)</span></h2>
    <input type="text" id="search" placeholder="Search symbol or strategy..." style="width:100%;padding:12px;margin-bottom:10px;">
    <table id="tradeTable">
        <thead><tr>
            <th onclick="sortTable(0)">Date</th>
            <th onclick="sortTable(1)">Symbol</th>
            <th onclick="sortTable(2)">Dir</th>
            <th onclick="sortTable(3)">Entry</th>
            <th onclick="sortTable(4)">Exit</th>
            <th onclick="sortTable(6)">P&L</th>
            <th>Actions</th>
        </tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let trades = JSON.parse(localStorage.getItem('tradesPro')) || [];
    let equityChart, winChart, monthlyChart;
    let sortDir = 1; // 1 = asc, -1 = desc

    function saveTrades() {
        localStorage.setItem('tradesPro', JSON.stringify(trades));
    }

    function calculateStats() {
        if (!trades.length) return { totalPnL: 0, winRate: 0, trades: 0, profitFactor: 0 };
        const totalPnL = trades.reduce((sum, t) => sum + (parseFloat(t.pnl) || 0), 0);
        const wins = trades.filter(t => (parseFloat(t.pnl) || 0) > 0);
        const winRate = ((wins.length / trades.length) * 100).toFixed(1);
        const grossProfit = wins.reduce((sum, t) => sum + (parseFloat(t.pnl) || 0), 0);
        const grossLoss = Math.abs(trades.filter(t => (parseFloat(t.pnl) || 0) < 0).reduce((sum, t) => sum + (parseFloat(t.pnl) || 0), 0));
        const profitFactor = grossLoss ? (grossProfit / grossLoss).toFixed(2) : '∞';

        return { totalPnL: totalPnL.toFixed(2), winRate, totalTrades: trades.length, profitFactor };
    }

    function renderStats() {
        const s = calculateStats();
        document.getElementById('stats').innerHTML = `
            <div class="card"><strong>Total Trades</strong><br>${s.totalTrades}</div>
            <div class="card"><strong>Total P&L</strong><br>\[ {s.totalPnL}</div>
            <div class="card"><strong>Win Rate</strong><br>${s.winRate}%</div>
            <div class="card"><strong>Profit Factor</strong><br>${s.profitFactor}</div>
        `;
    }

    function renderTable(filtered = trades) {
        const tbody = document.querySelector('#tradeTable tbody');
        tbody.innerHTML = '';
        filtered.forEach((trade, i) => {
            const pnl = parseFloat(trade.pnl) || 0;
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${trade.date}</td>
                <td>${trade.symbol}</td>
                <td>${trade.direction}</td>
                <td>${trade.entry}</td>
                <td>${trade.exit || '-'}</td>
                <td class="${pnl >= 0 ? 'win' : 'loss'}"> \]{pnl.toFixed(2)}</td>
                <td><button onclick="deleteTrade(${i})" class="btn-danger" style="padding:4px 8px;font-size:0.8em;">Delete</button></td>
            `;
            tbody.appendChild(row);
        });
    }

    function deleteTrade(index) {
        if (confirm('Delete this trade?')) {
            trades.splice(index, 1);
            saveTrades();
            refreshAll();
        }
    }

    function addTrade(e) {
        e.preventDefault();
        const pnl = document.getElementById('exit').value && document.getElementById('entry').value 
            ? ((parseFloat(document.getElementById('exit').value) - parseFloat(document.getElementById('entry').value)) * parseFloat(document.getElementById('quantity').value || 1) * (document.getElementById('direction').value === 'Short' ? -1 : 1)).toFixed(2)
            : (document.getElementById('pnl') ? document.getElementById('pnl').value : 0); // fallback if you add manual pnl later

        const newTrade = {
            symbol: document.getElementById('symbol').value.toUpperCase(),
            date: document.getElementById('date').value,
            direction: document.getElementById('direction').value,
            entry: parseFloat(document.getElementById('entry').value),
            exit: parseFloat(document.getElementById('exit').value) || null,
            quantity: parseFloat(document.getElementById('quantity').value),
            riskPercent: parseFloat(document.getElementById('riskPercent').value) || 0,
            rMultiple: parseFloat(document.getElementById('rMultiple').value) || 0,
            emotion: document.getElementById('emotion').value,
            strategy: document.getElementById('strategy').value,
            notes: document.getElementById('notes').value,
            screenshot: document.getElementById('screenshot').value,
            pnl: parseFloat(pnl) || 0
        };

        trades.unshift(newTrade);
        saveTrades();
        refreshAll();
        e.target.reset();
    }

    function refreshAll() {
        renderStats();
        renderTable();
        updateCharts();
    }

    function updateCharts() {
        // Equity Curve
        let cumulative = 0;
        const equityData = trades.slice().reverse().map(t => {
            cumulative += parseFloat(t.pnl) || 0;
            return cumulative;
        });

        if (equityChart) equityChart.destroy();
        equityChart = new Chart(document.getElementById('equityChart'), {
            type: 'line',
            data: { labels: trades.slice().reverse().map(t => t.date), datasets: [{ label: 'Equity Curve', data: equityData, borderColor: '#007bff', tension: 0.3 }] },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        // Win Rate Pie
        const wins = trades.filter(t => (parseFloat(t.pnl)||0) > 0).length;
        if (winChart) winChart.destroy();
        winChart = new Chart(document.getElementById('winChart'), {
            type: 'pie',
            data: {
                labels: ['Wins', 'Losses'],
                datasets: [{ data: [wins, trades.length - wins], backgroundColor: ['#28a745', '#dc3545'] }]
            }
        });

        // Monthly P&L (simple grouping)
        const monthly = {};
        trades.forEach(t => {
            const month = t.date.substring(0,7);
            monthly[month] = (monthly[month] || 0) + (parseFloat(t.pnl)||0);
        });
        if (monthlyChart) monthlyChart.destroy();
        monthlyChart = new Chart(document.getElementById('monthlyChart'), {
            type: 'bar',
            data: {
                labels: Object.keys(monthly),
                datasets: [{ label: 'Monthly P&L', data: Object.values(monthly), backgroundColor: '#007bff' }]
            }
        });
    }

    function exportCSV() { /* same as before, omitted for brevity - copy from previous version if needed */ 
        alert("Export functionality - add the previous CSV code here if you want it immediately.");
    }

    function clearAllData() {
        if (confirm('Delete ALL trades? This cannot be undone.')) {
            trades = [];
            saveTrades();
            refreshAll();
        }
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark');
    }

    // Search
    document.getElementById('search').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = trades.filter(t => 
            t.symbol.toLowerCase().includes(term) || 
            (t.strategy && t.strategy.toLowerCase().includes(term))
        );
        renderTable(filtered);
    });

    // Form
    document.getElementById('tradeForm').addEventListener('submit', addTrade);

    // Initial load
    refreshAll();
</script>
</body>
  </html>
